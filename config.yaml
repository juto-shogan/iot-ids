random_seed: 42

# Data loading modes:
# 1) separate_files (default): provide train_file + test_file
# 2) single_file_split: provide single_file + test_size
# For external datasets (e.g., Kaggle), set label_column explicitly.
data:
  mode: single_file_split
  single_file: data/Iot_Network_data.csv
  test_size: 0.2
  label_column: ['packet_size', 'transmission_time', 'protocol_type', 'bandwidth_usage', 'latency', 'jitter', 'packet_loss_rate', 'device_id', 'device_type', 'energy_usage', 'allocated_bandwidth']
  drop_columns: [id, ID, record_id, Record_ID]

paths:
  models_dir: models
  outputs_dir: outputs

preprocessing:
  variance_threshold: 0.0

ml:
  svm_max_samples: 30000

dl:
  enabled: true
  epochs: 20
  batch_size: 256
  max_samples: 60000
  max_features: 256
  threshold_metric: f1

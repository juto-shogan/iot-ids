random_seed: 42

# Data loading modes:
# 1) separate_files (default): provide train_file + test_file
# 2) single_file_split: provide single_file + test_size
# For external datasets (e.g., Kaggle), set label_column explicitly.
data:
  mode: separate_files
  train_file: data/UNSW_NB15_training-set.csv
  test_file: data/UNSW_NB15_testing-set.csv
  # single_file: data/Iot_Network_data.csv
  test_size: 0.2
  label_column: null
  drop_columns: [id, ID, record_id, Record_ID]

paths:
  models_dir: models
  outputs_dir: outputs

preprocessing:
  variance_threshold: 0.0

ml:
  svm_max_samples: 30000

dl:
  enabled: true
  epochs: 20
  batch_size: 256
  max_samples: 60000
  max_features: 256
  threshold_metric: f1
